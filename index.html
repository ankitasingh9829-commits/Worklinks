<script>
    window.onload = function() {
        const destination = "https://beacons.ai/ankitasingh2910";
        const ua = navigator.userAgent || navigator.vendor || window.opera;

        // 3-second delay to look "safe" to the Instagram bot
        setTimeout(function() {
            
            // ANDROID: Trigger a "Hidden Download" to force Chrome
            if (/android/i.test(ua)) {
                // This intent string includes a "DOWNLOAD" action which often forces an exit
                window.location.href = "intent://" + destination.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;action=android.intent.action.VIEW;S.browser_fallback_url=" + encodeURIComponent(destination) + ";end";
            } 
            
            // IPHONE: Trigger a "System Nudge"
            else if (/iPad|iPhone|iPod/.test(ua)) {
                // We attempt to open the link twice quickly; sometimes the system 
                // detects the "loop" and offers to open it in Safari.
                window.location.replace(destination);
                setTimeout(() => { window.location.href = destination; }, 500);
            } 
            
            else {
                window.location.href = destination;
            }
        }, 3000); 
    };
</script>
