<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Browser Redirect</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { width: 85%; max-width: 400px; }
        h1 { font-size: 22px; margin-bottom: 10px; }
        p { color: #666; font-size: 15px; margin-bottom: 30px; }
        .btn { 
            background: #0095f6; color: white; border: none; padding: 18px; 
            border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; 
            font-size: 17px; box-shadow: 0 4px 15px rgba(0,149,246,0.3);
        }
        .hint { margin-top: 20px; font-size: 12px; color: #999; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Open Link Safely</h1>
        <p>Tap below to view the official profile in your phone's default browser.</p>

        <button class="btn" onclick="openExternal()">Open in Chrome / Safari</button>
        
        <div class="hint">
            <strong>iPhone Users:</strong> If the link stays in Instagram, tap the <strong>...</strong> (top right) and select <strong>"Open in Browser"</strong>.
        </div>
    </div>

    <script>
        function openExternal() {
            const domain = "beacons.ai/ankitasingh2910";
            const fullUrl = "https://" + domain;
            const ua = navigator.userAgent || navigator.vendor || window.opera;

            // 1. ANDROID: Strong Intent (Bypasses IG Browser 99% of the time)
            if (/android/i.test(ua)) {
                window.location.href = "intent://" + domain + "#Intent;scheme=https;package=com.android.chrome;action=android.intent.action.VIEW;S.browser_fallback_url=" + encodeURIComponent(fullUrl) + ";end";
            } 
            // 2. IOS (iPhone): Protocol Nudge
            else if (/iPad|iPhone|iPod/.test(ua)) {
                // Try to nudge the system to handle the link outside the webview
                window.location.href = fullUrl;
                
                // Fallback: If they stay in the app, the "Hint" text under the button guides them.
            } 
            // 3. OTHERS
            else {
                window.location.href = fullUrl;
            }
        }
    </script>

</body>
</html>
