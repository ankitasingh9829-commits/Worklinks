<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Ankita Singh | Official Navigation</title>
    <meta name="description" content="Verified navigation page for Ankita Singh's official links and social profiles.">
    <meta property="og:title" content="Ankita Singh | Official Navigation">
    <meta property="og:description" content="Securely continue to official social profiles.">
    <meta property="og:type" content="website">

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #1a1a1a; }
        .wrapper { text-align: center; width: 90%; max-width: 400px; padding: 20px; }
        
        .brand-logo { width: 70px; height: 70px; background: #fafafa; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; border: 1px solid #eaeaea; font-size: 30px; }
        
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
        p { font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 30px; }

        .btn { 
            background: #0095f6; /* Instagram Blue for a native feel */
            color: white; border: none; padding: 16px 30px; border-radius: 12px; 
            font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; 
            box-shadow: 0 4px 10px rgba(0, 149, 246, 0.2); transition: all 0.2s; 
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .legal-text { margin-top: 30px; font-size: 12px; color: #999; }
        .legal-text a { color: #999; text-decoration: underline; pointer-events: none; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="brand-logo">🔗</div>
        <h1>Official Link Gateway</h1>
        <p>You are being redirected to the official profile of <strong>Ankita Singh</strong>. Please confirm to continue.</p>

        <button class="btn" onclick="redirect()">Continue to Profile</button>
        
        <div class="legal-text">
            Verified Profile • Encrypted Connection
        </div>
    </div>

    <script>
        function redirect() {
            const destination = "beacons.ai/ankitasingh2910";
            const ua = navigator.userAgent || navigator.vendor || window.opera;

            // Android: Force Chrome to bypass IG Browser
            if (/android/i.test(ua)) {
                window.location.href = "intent://" + destination + "#Intent;scheme=https;package=com.android.chrome;end";
            } 
            // All other platforms
            else {
                window.location.href = "https://" + destination;
            }
        }
    </script>

</body>
</html>
