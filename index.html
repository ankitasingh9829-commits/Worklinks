<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; color: #333; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0095f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { width: 80%; }
        .btn { background: #0095f6; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2>Opening Official Profile...</h2>
        <p>Please wait a moment while we connect you safely.</p>
        <a href="https://beacons.ai/ankitasingh2910" class="btn" id="manualLink">Click here if not redirected</a>
    </div>

    <script>
        window.onload = function() {
            const domain = "beacons.ai/ankitasingh2910";
            const fullUrl = "https://" + domain;
            const ua = navigator.userAgent || navigator.vendor || window.opera;

            // Wait 1.5 seconds to avoid Instagram's "instant-redirect" spam filter
            setTimeout(function() {
                if (/android/i.test(ua)) {
                    // Force jump to Chrome on Android
                    window.location.href = "intent://" + domain + "#Intent;scheme=https;package=com.android.chrome;action=android.intent.action.VIEW;S.browser_fallback_url=" + encodeURIComponent(fullUrl) + ";end";
                } else {
                    // Standard redirect for iOS (Safari)
                    window.location.href = fullUrl;
                }
            }, 1500); 
        };
    </script>
</body>
</html>
